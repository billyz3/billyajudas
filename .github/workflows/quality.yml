name: Billy Ajudas Quality

on:
  push:
    branches: [main, "agent/**"]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Environment
        run: php -v && python3 --version
      - name: PHP syntax
        run: find . -name '*.php' -not -path './vendor/*' -print0 | xargs -0 -n1 php -l
      - name: Catalog and security validation
        run: python3 tools/validate_site.py
      - name: Local HTTP smoke test
        run: |
          php -S 127.0.0.1:8765 -t . tools/router.php > /tmp/billyajudas-php.log 2>&1 &
          server_pid=$!
          trap 'kill $server_pid' EXIT
          python3 tools/smoke_local.py http://127.0.0.1:8765
